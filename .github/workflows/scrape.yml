name: Scrape News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python iran_news_scraper.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add news.json
          git commit -m "Auto update news [$(date +'%Y-%m-%d %H:%M')]" || true
          git push
